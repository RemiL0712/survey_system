services:
  - type: web
    name: survey-system-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --proxy-headers
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BOT_ID
        value: "1"
      - key: BOT_NAME
        value: Survey Bot
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://survey-system-api.onrender.com/api/v1
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: survey-system-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: survey-system-redis
          property: connectionString
      - key: ADMIN_WEB_PASSWORD
        sync: false
      - key: ADMIN_WEB_SECRET
        sync: false
      - key: ADMIN_WEB_COOKIE_SECURE
        value: "true"

  - type: worker
    name: survey-system-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m app.bot.bot
    plan: starter
    envVars:
      - key: BOT_ID
        value: "1"
      - key: BOT_NAME
        value: Survey Bot
      - key: BOT_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://survey-system-api.onrender.com/api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: survey-system-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: survey-system-redis
          property: connectionString
      - key: ADMIN_TG_ID
        value: ""
      - key: ADMIN_TG_IDS
        sync: false

  - type: keyvalue
    name: survey-system-redis
    plan: free
    ipAllowList: []

databases:
  - name: survey-system-db
    databaseName: survey_db
    user: survey_user
    plan: basic-256mb
