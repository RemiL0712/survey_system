services:
  api:
    build: .
    container_name: survey_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"

  bot:
    build: .
    container_name: survey_bot
    command: python -m app.bot.bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - api

  postgres:
    image: postgres:15
    container_name: survey_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
      POSTGRES_DB: survey_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: survey_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: survey_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/survey_system.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
