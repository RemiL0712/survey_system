<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survey Admin Login</title>
  <style>
    :root {
      --bg: #f4efe5;
      --card: rgba(255, 252, 247, 0.92);
      --ink: #23211c;
      --muted: #6a655a;
      --accent: #0e7c66;
      --danger: #b24132;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(240, 156, 82, 0.24), transparent 26%),
        radial-gradient(circle at bottom right, rgba(14, 124, 102, 0.18), transparent 28%),
        linear-gradient(180deg, #fbf7f0 0%, var(--bg) 100%);
      color: var(--ink);
    }
    .card {
      width: min(92vw, 420px);
      background: var(--card);
      border: 1px solid rgba(35, 33, 28, 0.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(60, 38, 12, 0.12);
    }
    h1 { margin: 0 0 8px; }
    p { color: var(--muted); margin: 0 0 18px; line-height: 1.5; }
    label {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    input, button { font: inherit; }
    input {
      width: 100%;
      border: 1px solid rgba(35, 33, 28, 0.14);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }
    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .status.error { color: var(--danger); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Survey Admin</h1>
    <p>Secure access to the internal survey dashboard.</p>
    <label>
      Password
      <input id="password" type="password" autocomplete="current-password" />
    </label>
    <button id="login" type="button">Sign in</button>
    <div id="status" class="status"></div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const statusNode = document.getElementById('status');
    const loginButton = document.getElementById('login');

    function setStatus(message, isError = false) {
      statusNode.textContent = message;
      statusNode.className = 'status' + (isError ? ' error' : '');
    }

    async function login() {
      const password = passwordInput.value;
      if (!password) {
        setStatus('Enter the password.', true);
        return;
      }

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({ detail: 'Login failed' }));
          throw new Error(payload.detail || 'Login failed');
        }

        window.location.href = '/admin';
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    loginButton.addEventListener('click', login);
    passwordInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') login();
    });
    passwordInput.focus();
  </script>
</body>
</html>
