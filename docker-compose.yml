version: "3.9"

services:

  api:
    build: .
    container_name: survey_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8001:8000"

  bot:
    build: .
    container_name: survey_bot
    command: python -m app.bot.bot
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - api
    environment:
    - PYTHONUNBUFFERED=1

  postgres:
    image: postgres:15
    container_name: survey_postgres
    environment:
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: survey_pass
      POSTGRES_DB: survey_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: survey_redis
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

